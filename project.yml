name: CodexMeter

options:
  bundleIdPrefix: com.bolyki
  deploymentTarget:
    macOS: 26.0

settings:
  base:
    SWIFT_VERSION: 6.0
    SUPPORTS_MACCATALYST: NO

targets:
  CodexMeterCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bolyki.CodexMeterCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  CodexMeterApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/CodexMeterApp
    dependencies:
      - target: CodexMeterCore
    settings:
      base:
        PRODUCT_NAME: Codexex
        PRODUCT_BUNDLE_IDENTIFIER: com.bolyki.Codexex
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Codexex

  CodexMeterCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CodexMeterCoreTests
    dependencies:
      - target: CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bolyki.CodexMeterCoreTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CodexMeterApp:
    build:
      targets:
        CodexMeterApp: all
        CodexMeterCore: all
    test:
      targets:
        - CodexMeterCoreTests
      gatherCoverageData: true
