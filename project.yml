name: CodexMeter

options:
  bundleIdPrefix: com.magrathean
  deploymentTarget:
    macOS: 26.0
    iOS: 26.0

settings:
  base:
    SWIFT_VERSION: 6.0
    SUPPORTS_MACCATALYST: NO
    MARKETING_VERSION: 3.0
    CURRENT_PROJECT_VERSION: 4
    DEVELOPMENT_TEAM: NPSQV9WYS5
    CODE_SIGN_STYLE: Automatic

targets:
  CodexMeterCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp.CodexMeterCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  CodexMeterCoreiOS:
    type: framework
    platform: iOS
    sources:
      - path: Sources/CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp.iOS.CodexMeterCore
        PRODUCT_NAME: CodexMeterCore
        PRODUCT_MODULE_NAME: CodexMeterCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  CodexMeterApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/CodexMeterApp
    dependencies:
      - target: CodexMeterCore
      - target: CodexexXPCService
      - package: Sentry
        product: Sentry
    settings:
      base:
        PRODUCT_NAME: Codexex
        PRODUCT_MODULE_NAME: CodexMeterApp
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: AppStore/Codexex.entitlements
        ENABLE_APP_SANDBOX: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Codexex
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_SENTRY_DSN: "https://1031cc43019235bb364666e515493646@o4511264196788224.ingest.de.sentry.io/4511291411595344"
    preBuildScripts:
      - name: Build Codexex Helper
        inputFiles:
          - $(PROJECT_DIR)/Helper/CodexexHelper/Cargo.toml
          - $(PROJECT_DIR)/Helper/CodexexHelper/Cargo.lock
          - $(PROJECT_DIR)/Helper/CodexexHelper/src/auth.rs
          - $(PROJECT_DIR)/Helper/CodexexHelper/src/lib.rs
          - $(PROJECT_DIR)/Helper/CodexexHelper/src/main.rs
          - $(PROJECT_DIR)/Helper/CodexexHelper/src/protocol.rs
          - $(PROJECT_DIR)/Helper/CodexexHelper/src/quota.rs
          - $(PROJECT_DIR)/Helper/CodexexHelper/src/state.rs
        outputFiles:
          - $(DERIVED_FILE_DIR)/codexex-helper/codexex-helper
        script: |
          "$PROJECT_DIR/Scripts/build-codexex-helper.sh"
    postBuildScripts:
      - name: Embed Codexex Helper
        inputFiles:
          - $(DERIVED_FILE_DIR)/codexex-helper/codexex-helper
          - $(PROJECT_DIR)/AppStore/CodexexHelper.entitlements
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/codexex-helper
        script: |
          "$PROJECT_DIR/Scripts/embed-codexex-helper.sh"

  CodexMeteriOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/CodexMeteriOS
      - path: Sources/CodexMeterApp/Assets.xcassets
      - path: Sources/CodexMeterApp/Support/CodexSummarySnooze.swift
      - path: Sources/CodexMeterApp/Support/CodexUsageHistoryAnalytics.swift
      - path: Sources/CodexMeterApp/Support/CodexUsageHistoryStore.swift
      - path: Sources/CodexMeterApp/UI/PopupPresentation.swift
    dependencies:
      - target: CodexMeterCoreiOS
    settings:
      base:
        PRODUCT_NAME: Codexex
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: iOSAppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Codexex
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsMultipleScenes: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  CodexexXPCService:
    type: xpc-service
    platform: macOS
    sources:
      - path: Sources/CodexexXPCService
    dependencies:
      - target: CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp.CodexexXPCService
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/CodexexXPCService/Info.plist
        CODE_SIGN_ENTITLEMENTS: AppStore/CodexexXPCService.entitlements
        ENABLE_APP_SANDBOX: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"

  CodexMeterCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CodexMeterCoreTests
    dependencies:
      - target: CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp.CodexMeterCoreTests
        GENERATE_INFOPLIST_FILE: YES

  CodexMeterAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CodexMeterAppTests
    dependencies:
      - target: CodexMeterApp
      - target: CodexMeterCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp.CodexMeterAppTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Codexex.app/Contents/MacOS/Codexex"
        BUNDLE_LOADER: "$(TEST_HOST)"

  CodexMeteriOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CodexMeteriOSTests
    dependencies:
      - target: CodexMeteriOS
      - target: CodexMeterCoreiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magrathean.CodexexApp.CodexMeteriOSTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Codexex.app/Codexex"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  CodexMeterApp:
    build:
      targets:
        CodexMeterApp: all
        CodexexXPCService: all
        CodexMeterCore: all
    test:
      targets:
        - CodexMeterCoreTests
        - CodexMeterAppTests
      gatherCoverageData: true

  CodexMeteriOS:
    build:
      targets:
        CodexMeteriOS: all
        CodexMeterCoreiOS: all
    test:
      targets:
        - CodexMeteriOSTests
      gatherCoverageData: true

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    exactVersion: 8.58.0
